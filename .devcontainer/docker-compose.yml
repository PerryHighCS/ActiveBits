version: "3.8"

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22
    user: vscode
    # Allow nested sandbox tools inside the devcontainer without fully
    # disabling seccomp for every syscall.
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    volumes:
      - ..:/workspaces/ActiveBits:cached
    command: sleep infinity
    environment:
      VALKEY_URL: redis://valkey:6379
      HOST: 0.0.0.0
    depends_on:
      - valkey

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
