name: CI

on:
  push:
  pull_request:

env:
  ACTIVITY_TEST_GROUP_COUNT: '3'

jobs:
  metadata-checks:
    runs-on: ubuntu-latest
    outputs:
      activity-test-matrix: ${{ steps.activity-test-groups.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node version sync
        run: npm run verify:node-version-sync

      - name: Verify Playwright version sync
        run: npm run verify:playwright-version-sync

      - name: Verify activity test groups
        id: activity-test-groups
        run: |
          npm run verify:activity-test-groups
          echo "matrix=$(node scripts/verify-activity-test-groups.mjs --matrix)" >> "$GITHUB_OUTPUT"

  client-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Lint client
        run: npm --workspace client run lint

      - name: Typecheck client
        run: npm --workspace client run typecheck

  server-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Lint server
        run: npm --workspace server run lint

      - name: Typecheck server
        run: npm --workspace server run typecheck

  activities-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Lint activities
        run: npm --workspace activities run lint

      - name: Typecheck activities
        run: npm --workspace activities run typecheck

  client-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run client tests
        run: npm --workspace client test

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run server tests
        run: npm --workspace server test

  activities-tests:
    needs: metadata-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.metadata-checks.outputs.activity-test-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run activity group tests
        run: node scripts/run-activity-test-group.mjs ${{ matrix.name }}

  verify-build-and-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Verify deploy build
        run: npm run verify:deploy

      - name: Verify server smoke
        run: npm run verify:server

  browser-smoke:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
          if-no-files-found: ignore
