name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node version sync
        run: npm run verify:node-version-sync

      - name: Verify Playwright version sync
        run: npm run verify:playwright-version-sync

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  client-tests:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run client tests
        run: npm --workspace client test

  server-tests:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run server tests
        run: npm --workspace server test

  activities-tests:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run activities tests
        run: npm --workspace activities test

  verify-build-and-server:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Verify deploy build
        run: npm run verify:deploy

      - name: Verify server smoke
        run: npm run verify:server

  browser-smoke:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm_config_production=false npm ci --workspaces --include-workspace-root; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed (attempt $attempt). Retrying after short delay..."
              sleep 3
            fi
          done
          echo "Dependency install failed after 3 attempts"
          exit 1

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
